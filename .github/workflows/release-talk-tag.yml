name: Release Talk Tag

on:
  push:
    tags:
      - 'V*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish manually
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Repair incomplete sherpa native cache
        shell: powershell
        run: |
          $cacheRoot = Join-Path $PWD 'target\sherpa-onnx-prebuilt'
          $nativeLibrary = Get-ChildItem -LiteralPath $cacheRoot -File -Recurse -Filter 'sherpa-onnx-c-api.lib' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $nativeLibrary) {
            if (Test-Path -LiteralPath $cacheRoot) {
              Remove-Item -LiteralPath (Join-Path $PWD 'target\sherpa-onnx-prebuilt') -Recurse -Force
            }
            cargo clean -p sherpa-onnx-sys
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to invalidate the sherpa-onnx-sys build-script cache: $LASTEXITCODE"
            }
            Write-Host 'Invalidated incomplete sherpa native cache; Cargo will download or re-extract it.'
          }

      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.7.1

      - name: Validate repository contracts
        shell: powershell
        run: |
          Invoke-Pester -Path .\scripts\tests\GitHub-Actions.Tests.ps1 -CI
          Invoke-Pester -Path .\scripts\tests\Publish-TalkRelease.Tests.ps1 -CI

      - name: Verify Rust workspace
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets
          cargo test --workspace

      - name: Resolve release tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq 'workflow_dispatch') {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }
          if ($tag -notmatch '^V\d+\.\d+\.\d+$') {
            throw "Release tag must match Vx.x.x. Received: $tag"
          }

          "TALK_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and validate credential-free release
        shell: powershell
        run: |
          Remove-Item Env:TALK_PROVIDER_API_KEY -ErrorAction SilentlyContinue
          $releaseRoot = Join-Path $PWD 'release\Talk'
          $versionId = "talk-windows-x64-$env:TALK_TAG"

          .\scripts\Publish-TalkRelease.ps1 `
            -VersionId $versionId `
            -ReleaseRoot $releaseRoot `
            -ProductProfile `
            -EmitEvidence `
            -DisablePackagedApiKeyDiscovery `
            -SkipVerification `
            -SkipSmoke `
            -SkipNativePreflight `
            -SkipNativeReadiness

          $releaseDir = Join-Path $releaseRoot $versionId
          .\scripts\Test-TalkProductRelease.ps1 -ProductPath $releaseDir

          $configText = Get-Content -LiteralPath (Join-Path $releaseDir 'talk.toml') -Raw
          if ($configText -match '(?m)^\s*api_key\s*=') {
            throw 'GitHub release must not contain provider.api_key'
          }
          if ($configText -notmatch 'api_key_env\s*=\s*"TALK_PROVIDER_API_KEY"') {
            throw 'GitHub release must use provider.api_key_env'
          }

          $assetPath = Join-Path $releaseRoot "talk-windows-x64-$env:TALK_TAG.zip"
          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $assetPath -Force
          "TALK_RELEASE_ASSET=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TALK_RELEASE_EVIDENCE_DIR=$(Join-Path (Join-Path $releaseRoot '_ci') $versionId)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Talk release validation evidence
        uses: actions/upload-artifact@v6
        with:
          name: talk-windows-x64-evidence-${{ env.TALK_TAG }}
          path: ${{ env.TALK_RELEASE_EVIDENCE_DIR }}
          if-no-files-found: error

      - name: Publish Talk GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TALK_TAG }}
          name: ${{ env.TALK_TAG }}
          generate_release_notes: true
          files: ${{ env.TALK_RELEASE_ASSET }}
          overwrite_files: true
          fail_on_unmatched_files: true
