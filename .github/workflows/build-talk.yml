name: Build Talk

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Repair incomplete sherpa native cache
        shell: powershell
        run: |
          $cacheRoot = Join-Path $PWD 'target\sherpa-onnx-prebuilt'
          $sharedCache = Get-ChildItem -LiteralPath $cacheRoot -Directory -Filter 'sherpa-onnx-v*-win-x64-shared-MT-Release-lib' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $sharedCache) {
            $nativeLibrary = Join-Path $sharedCache.FullName 'lib\sherpa-onnx-c-api.lib'
            if (-not (Test-Path -LiteralPath $nativeLibrary -PathType Leaf)) {
              Remove-Item -LiteralPath (Join-Path $PWD 'target\sherpa-onnx-prebuilt') -Recurse -Force
              Write-Host 'Removed incomplete sherpa-onnx-prebuilt cache; Cargo will re-extract it.'
            }
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --workspace --all-targets

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build credential-free Windows package
        shell: powershell
        run: |
          Remove-Item Env:TALK_PROVIDER_API_KEY -ErrorAction SilentlyContinue
          $releaseRoot = Join-Path $PWD 'release\Talk'
          $versionId = "ci-$env:GITHUB_SHA"

          .\scripts\Publish-TalkRelease.ps1 `
            -VersionId $versionId `
            -ReleaseRoot $releaseRoot `
            -DisablePackagedApiKeyDiscovery `
            -SkipVerification `
            -SkipSmoke `
            -SkipNativePreflight `
            -SkipNativeReadiness

          $releaseDir = Join-Path $releaseRoot $versionId
          $configText = Get-Content -LiteralPath (Join-Path $releaseDir 'talk-desktop.toml') -Raw
          if ($configText -match '(?m)^\s*api_key\s*=') {
            throw 'CI release must not contain provider.api_key'
          }
          if ($configText -notmatch 'api_key_env\s*=\s*"TALK_PROVIDER_API_KEY"') {
            throw 'CI release must use provider.api_key_env'
          }

          "TALK_RELEASE_DIR=$releaseDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Talk Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: talk-windows-x64-${{ github.sha }}
          path: ${{ env.TALK_RELEASE_DIR }}
          if-no-files-found: error
