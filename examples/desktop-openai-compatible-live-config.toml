# Recommended live Talk desktop config for Typeless-style hotkey conversation
# through an OpenAI-compatible provider path on Windows.

voice_mode = "dictate"

[trigger]
mode = "toggle"
toggle_shortcut = "RightAlt"

[desktop.shortcuts]
translate_shortcut = "RightAlt+/"
ask_shortcut = "RightAlt+Space"

[audio]
backend = "native_windows"
# Optional: pin a specific Windows input endpoint instead of the current default device.
# input_device = "Virtual Mic"
max_recording_seconds = 15
sample_rate_hz = 16000
channels = 1
temp_dir = ".runtime/talk-openai-live/audio"

[provider]
kind = "openai_compatible"
audio_transcriptions_endpoint = "http://127.0.0.1:4200/v1/audio/transcriptions"
chat_completions_endpoint = "http://127.0.0.1:4200/v1/chat/completions"
transcription_model = "gpt-4o-mini-transcribe"
chat_model = "gpt-4o-mini"
api_key_env = "TALK_PROVIDER_API_KEY"

[output]
mode = "clipboard_paste"
restore_clipboard = true
clipboard_backend = "native_windows"

[logging]
dir = ".runtime/talk-openai-live/logs"
